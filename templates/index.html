<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diabetes Predictor | ML Mini Project</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ef;
      --white:    #ffffff;
      --border:   #e2ddd6;
      --text:     #1c1917;
      --muted:    #78716c;
      --accent:   #16a34a;
      --accent2:  #15803d;
      --red:      #dc2626;
      --red-bg:   #fef2f2;
      --red-bdr:  #fecaca;
      --green-bg: #f0fdf4;
      --green-bdr:#bbf7d0;
      --pill-bg:  #dcfce7;
      --pill-txt: #14532d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 20px 40px;
    }

    .wrapper { max-width: 820px; margin: 0 auto; }

    /* ── HEADER ── */
    header { text-align: center; padding: 20px 0 32px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--pill-bg);
      color: var(--pill-txt);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 18px;
      text-transform: uppercase;
      border: 1px solid #86efac;
    }

    h1 {
      font-size: clamp(26px, 5vw, 42px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    h1 em { color: var(--accent); font-style: normal; }

    .sub {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 0 0 24px;
    }

    .stat {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      text-align: center;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 28px 32px;
      margin-bottom: 18px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }

    .section-label::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 4px;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .field label .unit {
      color: #a8a29e;
      font-size: 9px;
      margin-left: 3px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }

    .field input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }

    .field input::placeholder { color: #c4bfba; }

    /* ── BUTTON ── */
    .btn-row { margin-top: 24px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.18s, transform 0.12s;
    }

    .btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.loading { opacity: 0.65; pointer-events: none; }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    /* ── RESULT ── */
    #result { display: none; }

    .result-wrap {
      border-radius: 14px;
      padding: 26px 28px;
      border: 1.5px solid;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .result-wrap.positive { background: var(--red-bg); border-color: var(--red-bdr); }
    .result-wrap.negative { background: var(--green-bg); border-color: var(--green-bdr); }

    .result-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .positive .result-icon { background: #fee2e2; }
    .negative .result-icon { background: #dcfce7; }

    .result-body { flex: 1; }

    .result-label {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .positive .result-label { color: var(--red); }
    .negative .result-label { color: #15803d; }

    .result-conf {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .bars { display: flex; flex-direction: column; gap: 9px; }

    .bar-row { display: flex; align-items: center; gap: 10px; }

    .bar-label { font-size: 11px; font-weight: 500; color: var(--muted); width: 68px; flex-shrink: 0; }

    .bar-track {
      flex: 1;
      height: 8px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.9s cubic-bezier(.4,0,.2,1);
    }

    .bar-fill.d { background: var(--red); }
    .bar-fill.h { background: var(--accent); }

    .bar-pct {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      width: 36px;
    }

    /* ── TIP ── */
    .tip {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
      display: none;
    }

    .tip.show { display: block; }
    .tip strong { color: var(--text); font-weight: 600; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 0 10px;
      font-size: 11px;
      color: #a8a29e;
      font-family: 'DM Mono', monospace;
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      white-space: nowrap;
      z-index: 99;
    }

    @media (max-width: 540px) {
      .stats { grid-template-columns: repeat(2,1fr); }
      .grid  { grid-template-columns: 1fr 1fr; }
      .card  { padding: 20px 16px 24px; }
      .result-wrap { flex-direction: column; gap: 14px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>Diabetes <em>Risk</em> Predictor</h1>
    <p class="sub">Logistic Regression &nbsp;·&nbsp; Pima Indians Dataset &nbsp;·&nbsp; ~79% Accuracy</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-val">768</div>
      <div class="stat-lbl">Records</div>
    </div>
    <div class="stat">
      <div class="stat-val">8</div>
      <div class="stat-lbl">Features</div>
    </div>
    <div class="stat">
      <div class="stat-val">~79%</div>
      <div class="stat-lbl">Accuracy</div>
    </div>
    <div class="stat">
      <div class="stat-val">LogReg</div>
      <div class="stat-lbl">Algorithm</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Patient Information</div>
    <div class="grid">
      <div class="field">
        <label>Pregnancies <span class="unit">(count)</span></label>
        <input type="number" id="pregnancies" placeholder="e.g. 2" min="0" max="20"/>
      </div>
      <div class="field">
        <label>Glucose <span class="unit">(mg/dL)</span></label>
        <input type="number" id="glucose" placeholder="e.g. 120" min="0"/>
      </div>
      <div class="field">
        <label>Blood Pressure <span class="unit">(mmHg)</span></label>
        <input type="number" id="blood_pressure" placeholder="e.g. 70" min="0"/>
      </div>
      <div class="field">
        <label>Skin Thickness <span class="unit">(mm)</span></label>
        <input type="number" id="skin_thickness" placeholder="e.g. 20" min="0"/>
      </div>
      <div class="field">
        <label>Insulin <span class="unit">(μU/mL)</span></label>
        <input type="number" id="insulin" placeholder="e.g. 80" min="0"/>
      </div>
      <div class="field">
        <label>BMI <span class="unit">(kg/m²)</span></label>
        <input type="number" id="bmi" placeholder="e.g. 25.0" step="0.1" min="0"/>
      </div>
      <div class="field">
        <label>Diabetes Pedigree <span class="unit">(DPF)</span></label>
        <input type="number" id="dpf" placeholder="e.g. 0.52" step="0.01" min="0"/>
      </div>
      <div class="field">
        <label>Age <span class="unit">(years)</span></label>
        <input type="number" id="age" placeholder="e.g. 30" min="1" max="120"/>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" id="predictBtn" onclick="predict()">&#128269;&nbsp; Predict Now</button>
      <button class="btn-reset" onclick="resetForm()">Clear</button>
    </div>
  </div>

  <div class="card" id="result">
    <div class="section-label">Prediction Result</div>

    <div class="result-wrap" id="resultBox">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-body">
        <div class="result-label" id="resultLabel"></div>
        <div class="result-conf" id="resultConf"></div>
        <div class="bars">
          <div class="bar-row">
            <div class="bar-label">Diabetic</div>
            <div class="bar-track"><div class="bar-fill d" id="barD"></div></div>
            <div class="bar-pct" id="pctD"></div>
          </div>
          <div class="bar-row">
            <div class="bar-label">Healthy</div>
            <div class="bar-track"><div class="bar-fill h" id="barH"></div></div>
            <div class="bar-pct" id="pctH"></div>
          </div>
        </div>
        <div class="tip" id="tip"></div>
      </div>
    </div>
  </div>

  <footer>
    Built with Flask + Scikit-learn &nbsp;·&nbsp; <a href="#">Pima Indians Dataset</a> &nbsp;·&nbsp; 2024
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
  const tips = {
    positive: [
      "<strong>Note:</strong> This is an ML prediction, not a medical diagnosis. Please consult a doctor.",
      "<strong>Key factors:</strong> High glucose and BMI are the strongest indicators in this dataset.",
      "<strong>Reminder:</strong> Regular blood sugar checks are recommended if you're at risk."
    ],
    negative: [
      "<strong>Great news!</strong> Low risk predicted. Keep up the healthy lifestyle!",
      "<strong>Stay healthy:</strong> Regular exercise and a balanced diet help maintain low risk.",
      "<strong>Note:</strong> ~79% accuracy — always confirm with a proper medical test."
    ]
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  function resetForm() {
    ['pregnancies','glucose','blood_pressure','skin_thickness','insulin','bmi','dpf','age']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('result').style.display = 'none';
  }

  async function predict() {
    const ids = ['pregnancies','glucose','blood_pressure','skin_thickness','insulin','bmi','dpf','age'];
    const data = {};
    for (const id of ids) {
      const val = document.getElementById(id).value;
      if (val === '') { showToast('Please fill in all fields!'); return; }
      data[id] = val;
    }

    const btn = document.getElementById('predictBtn');
    btn.textContent = 'Predicting...';
    btn.classList.add('loading');

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.error) { showToast('Error: ' + result.error); return; }

      const isDiabetic = result.prediction === 1;

      document.getElementById('resultBox').className = 'result-wrap ' + (isDiabetic ? 'positive' : 'negative');
      document.getElementById('resultIcon').textContent = isDiabetic ? '⚠️' : '✅';
      document.getElementById('resultLabel').textContent = result.label;
      document.getElementById('resultConf').textContent = 'Confidence: ' + result.confidence + '%';

      setTimeout(() => {
        document.getElementById('barD').style.width = result.diabetic_prob + '%';
        document.getElementById('barH').style.width = result.healthy_prob + '%';
      }, 80);

      document.getElementById('pctD').textContent = result.diabetic_prob + '%';
      document.getElementById('pctH').textContent = result.healthy_prob + '%';

      const pool = isDiabetic ? tips.positive : tips.negative;
      const tip = document.getElementById('tip');
      tip.innerHTML = pool[Math.floor(Math.random() * pool.length)];
      tip.classList.add('show');

      document.getElementById('result').style.display = 'block';
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      showToast('Server error — is Flask running?');
    } finally {
      btn.textContent = '🔍 Predict Now';
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
